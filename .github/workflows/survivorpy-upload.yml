name: Upload Survivor Data to S3

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * *'

jobs:
  upload_to_s3:
    runs-on: ubuntu-latest

    env:
      GITHUB_PAT: ${{ secrets.GH_PAT }}
      GITHUB_USER: ${{ secrets.GH_USER }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            cmake \
            make \
            g++ \
            libutf8proc-dev \
            libre2-dev \
            libz-dev \
            liblz4-dev \
            libzstd-dev

      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: ${{ runner.os }}-r-${{ hashFiles('data_pipeline/run_pipeline.R') }}
          restore-keys: |
            ${{ runner.os }}-r-

      - name: Install R packages
        run: |
          install.packages(c("aws.s3", "jsonlite", "remotes", "arrow", "digest"))
          remotes::install_github("doehm/survivoR")
        shell: Rscript {0}

      - name: Run R script to upload data to S3
        run: Rscript data_pipeline/run_pipeline.R

      - name: Zip parquet files and upload archive to S3
        run: |
          mkdir -p zipped_data
          aws s3 cp s3://survivorpy-data/tables/ ./zipped_data/ --recursive --exclude "*" --include "*.parquet"
          cd zipped_data
          zip survivor_data.zip *.parquet
          aws s3 cp survivor_data.zip s3://survivorpy-data/survivor_data.zip

